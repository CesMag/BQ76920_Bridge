name: Build & Analyze

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ──────────────────────────────────────────────
  # Debug build — verifies the project compiles
  # ──────────────────────────────────────────────
  build-debug:
    name: Build (Debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Configure (Debug)
        run: cmake --preset debug

      - name: Build (Debug)
        run: cmake --build build/debug --parallel

      - name: Verify ELF output
        run: |
          ELF="build/debug/BQ76920_Bridge.elf"
          if [ ! -f "$ELF" ]; then
            echo "ERROR: $ELF not found"
            exit 1
          fi
          echo "ELF found: $(ls -lh $ELF)"
          arm-none-eabi-size "$ELF"

  # ──────────────────────────────────────────────
  # Release build — produces publishable artifacts
  # ──────────────────────────────────────────────
  build-release:
    name: Build (Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Configure (Release)
        run: cmake --preset release

      - name: Build (Release)
        run: cmake --build build/release --parallel

      - name: Verify ELF output
        run: |
          ELF="build/release/BQ76920_Bridge.elf"
          if [ ! -f "$ELF" ]; then
            echo "ERROR: $ELF not found"
            exit 1
          fi
          echo "ELF found: $(ls -lh $ELF)"

      - name: Generate binary (.bin)
        run: |
          arm-none-eabi-objcopy \
            -O binary \
            build/release/BQ76920_Bridge.elf \
            build/release/BQ76920_Bridge.bin
          echo "BIN: $(ls -lh build/release/BQ76920_Bridge.bin)"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            build/release/BQ76920_Bridge.elf
            build/release/BQ76920_Bridge.bin
          retention-days: 90

  # ──────────────────────────────────────────────
  # Size report — posts Flash/RAM usage as summary
  # ──────────────────────────────────────────────
  size-report:
    name: Flash / RAM Size Report
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Download Release artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: firmware

      - name: Generate size report
        run: |
          ELF="firmware/BQ76920_Bridge.elf"

          echo "## Firmware Size Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Berkeley format: section sizes
          echo "### Section Breakdown" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          arm-none-eabi-size --format=sysv "$ELF" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Parse text/data/bss from standard (Berkeley) format
          SIZE_OUTPUT=$(arm-none-eabi-size "$ELF")
          TEXT=$(echo "$SIZE_OUTPUT" | awk 'NR==2{print $1}')
          DATA=$(echo "$SIZE_OUTPUT" | awk 'NR==2{print $2}')
          BSS=$(echo "$SIZE_OUTPUT"  | awk 'NR==2{print $3}')
          FLASH=$(( TEXT + DATA ))
          RAM=$(( DATA + BSS ))

          echo "### Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Region | Used (bytes) | Limit (bytes) |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------------|---------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flash  | $FLASH      | 1,048,576 (1 MB) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| RAM    | $RAM        | 196,608 (192 KB) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Also print to the log
          echo "Flash used: $FLASH bytes"
          echo "RAM used:   $RAM bytes"

