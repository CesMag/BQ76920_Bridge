# Adafruit Feather STM32F405 -- OpenOCD SWD debug configuration
# Used by CLion "OpenOCD Download & Run" run configuration.
#
# Hardware required: ST-Link v2 (or clone) connected to the Feather SWD pads
# on the bottom 2x5 castellated header:
#
#   ST-Link  ->  Feather pad  (signal)
#   -------      -----------
#   SWDIO   ->   PA13         (SWDIO)
#   SWCLK   ->   PA14         (SWCLK)
#   GND     ->   GND
#   3.3V    ->   3V3          (optional -- Feather can be USB-powered)
#
# CLion setup (Run | Edit Configurations | + | OpenOCD Download & Run):
#   Executable:    build/debug/BQ76920_Bridge.elf
#   Board config:  openocd.cfg  (this file)
#   OpenOCD home:  /opt/homebrew  (or wherever `which openocd` points)

source [find interface/stlink.cfg]
transport select hla_swd

# STM32F405 has 1 MB flash; use 64 kB work area in RAM for fast programming.
# Must be set before sourcing the target config -- stm32f4x.cfg reads it at load.
set WORKAREASIZE 0x10000

source [find target/stm32f4x.cfg]

# ST-Link HLA does not expose the SRST line independently on the SWD header
# above, so rely on SWD (AIRCR.SYSRESETREQ) for reset instead of NRST.
reset_config none
